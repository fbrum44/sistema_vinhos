<!DOCTYPE html> 
<html lang="pt-BR">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winery</title>
    <link rel="stylesheet" href="{% static 'loja/styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="logo">winery</div>
            <nav>
              <a href="{% url 'sobre' %}">sobre</a>
                <a href="#">vinhos</a>
                <a href="#">kits</a>
            </nav>
            <div class="search-login-cart">
                <input type="text" placeholder="Pesquisar...">
                <button id="openLoginBtn" class="login">login</button>
                <a href="#" class="cart"><i class="fas fa-shopping-cart"></i></a>
            </div>
        </div>
    </header>

    <main>
        <div class="hero-image"></div>
    </main>

    <footer>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fas fa-times"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </footer>

    <div id="loginModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="closeLoginBtn">&times;</span>
        <h2>login</h2>
        <form>
          <label for="username">e-mail:</label>
          <input type="text" id="username" name="username" placeholder="Digite seu e-mailstart index.html" required />

          <label for="password">senha:</label>
          <input type="password" id="password" name="password" placeholder="Digite sua senha" required />

          <button type="submit">entrar</button>

          <p style="text-align: center; margin-top: 10px;">Não tem uma conta? 
            <a href="#" id="openRegisterFromLogin" class="register-link">Cadastre-se</a>
          </p>

        </form>
      </div>
    </div>

    <div id="registerModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="closeRegisterBtn">&times;</span>
        <h2>Cadastro</h2>
        <form>
            <label for="fullName">nome completo:</label>
            <input type="text" id="fullName" name="fullName" placeholder="Digite seu nome completo" required />

            <label for="birthDate">data de nascimento:</label>
            <input type="date" id="birthDate" name="birthDate" required />

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required />

            <label for="newEmail">email:</label>
            <input type="email" id="newEmail" name="newEmail" placeholder="Digite seu email" required />

            <label for="newPassword">senha:</label>
            <input type="password" id="newPassword" name="newPassword" placeholder="Digite sua senha" required />

            <button type="submit">Cadastrar</button>
         </form>
        </div>
    </div>

    <script src="{% static 'loja/script.js' %}"></script>
</body>
</html>
